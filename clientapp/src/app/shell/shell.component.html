<div class="page-wrapper" [ngClass]="{'toggled' : getSideBarState()}">
    <main class="page-content">
        <app-header></app-header>
        <app-sidebar></app-sidebar>
        <div class="container-fluid">
            <div class="row">
                <div class="col-12">
                    <router-outlet></router-outlet>
                </div>
            </div>
            <div class="row">
                <div class="col text-end pt-3">
                    <label for="timestamp"><small>Release date : {{timestamp|localeDate:'d MMM y HH:mm:ss'}} </small></label>
                </div>
            </div>
        </div>
        <div class="overlay" *ngIf="!getSideBarState() && (isMediumScreen | async)" [@fadeAnimation]
            (click)="toggleSidebar()" onkeypress=""></div>
    </main>
    @if (showBanner) {
    <div class="banner" [ngStyle]="{'background-color': bannerColor}">
        <h3 class="text-white mt-2 mb-2">{{ environment }} Environment</h3>
    </div>
    }
</div>
