<toolbar>
    <button class="btn btn-primary" (click)="getReport()" *ngIf="actions.print == true">
        <i class="fas fa-cog fa-spin" [hidden]="!saving"></i>
        <i class="fas fa-save" [hidden]="saving"></i> {{ 'label.ALL.Report' | translate }}
    </button>
</toolbar>
<br>

<h4 style="padding-top: 10px;">{{ 'label.SURP02.ProgramName' | translate }}</h4>
<div class="row">
    <div class="col">
        <app-card>
            <div class="card-content">
                <form [formGroup]="reportForm">
                    <div class="row g-3">
                        <div class="col-md-6 col-sm-6">
                            <select-input [items]="master.companyList" formControlName="companyCodeFrom"
                                placeholder="{{ 'label.ALL.PleaseSelect' | translate }}">{{ 'label.SURP02.CompanyCodeFrom' | translate
                                }}</select-input>
                        </div>
                        <div class="col-md-6 col-sm-6">
                            <select-input [items]="master.companyList" formControlName="companyCodeTo"
                                placeholder="{{ 'label.ALL.PleaseSelect' | translate }}">{{ 'label.SURP02.CompanyCodeTo' | translate
                                }}</select-input>
                        </div>
                    </div>

                    <div class="row g-3">
                        <div class="col-md-6 col-sm-6">
                            <lookup formControlName="userNameFrom" [source]="userNameSource"
                                [onOpen]="onOpenUserNameLookup">
                                {{ 'label.SURP02.UserNameFrom' | translate }}
                            </lookup>
                        </div>
                        <div class="col-md-6 col-sm-6">
                            <lookup formControlName="userNameTo" [source]="userNameSource"
                                [onOpen]="onOpenUserNameLookup">
                                {{ 'label.SURP02.UserNameTo' | translate }}
                            </lookup>
                        </div>
                    </div>

                    <div class="row g-3">
                        <div class="col-md-6 col-sm-6">
                            <radio-button formControlName="active" [items]="master.activeStatus">
                                {{ 'label.SURP02.Status' | translate }}
                            </radio-button>
                        </div>
                    </div>
                </form>
            </div>
        </app-card>
    </div>
</div>
