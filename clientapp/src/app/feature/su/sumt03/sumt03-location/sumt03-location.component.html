<div class="row">
    <div class="col">
        <app-card>
            <div class="card-content">
                <div class="row mb-3">
                    <div class="col text-end" *ngIf="actions.create == true">
                        <button class="btn btn-primary" (click)="add()">
                            <i class="fas fa-plus-circle"></i> {{ 'label.ALL.Add' | translate }}
                        </button>
                    </div>
                </div>
                <app-table [dataSource]="dataSource" [columns]="displayedColumns" [pagination]="false">
                    <ng-container matColumnDef="locationName">
                        <th mat-header-cell *matHeaderCellDef columnWidth="250px" class="text-center">{{
                            'label.SUMT03.Location' | translate }}</th>
                        <td mat-cell *matCellDef="let row" class="text-left">
                            <a href="javascript:void(0)" (click)="edit(row)">{{ row.locationName }}</a>
                        </td>
                    </ng-container>
                    <ng-container matColumnDef="locationType">
                        <th mat-header-cell *matHeaderCellDef columnWidth="150px" class="text-center">{{
                            'label.SUMT03.LocationType' | translate }}</th>
                        <td mat-cell *matCellDef="let row" class="text-center">{{ row.locationType }}</td>
                    </ng-container>
                    <ng-container matColumnDef="action">
                        <th mat-header-cell *matHeaderCellDef columnWidth="50px" class="text-center">{{
                            'label.ALL.Delete' | translate }}</th>
                        <td mat-cell *matCellDef="let row" class="text-center">
                            <button class="btn btn-outline-danger btn-sm" (click)="remove(row)"
                                *ngIf="actions.delete == true">
                                <i class="far fa-trash-alt"></i>
                            </button>
                        </td>
                    </ng-container>
                    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
                </app-table>
            </div>
        </app-card>
    </div>
</div>
