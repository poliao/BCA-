<!-- ###### Save Action ###### -->
<toolbar>
  <button class="btn btn-primary" (click)="save()" *ngIf="actions.edit == true">
    <i class="fas fa-save" ></i> {{ 'label.ALL.Save' | translate}}
  </button>
</toolbar>

<h4>{{ 'label.SUMT06.ProgramNameDetail' | translate }}</h4>
<div class="row">
  <div class="col">
    <!-- ###### Master Section ###### -->
    <app-card header="{{ 'label.SUMT06.UserDetail' | translate}}">
      <div class="card-content">
          <form #header [formGroup]="departmentDetailDataSource.form">
            <div class="row">
                <div class="col-lg-3 col-md-3 col-sm-6">
                  <textbox formControlName="userName" class="text-center">{{ 'label.SUMT06.UserName' | translate }} </textbox>
                </div>
                <div class="col-lg-3 col-md-3 col-sm-6">
                  <textbox formControlName="empName">{{ 'label.SUMT06.EmployeeSU' | translate }}</textbox>
                </div>
                <div class="col-lg-3 col-md-3 col-sm-6">
                  <textbox formControlName="companyName">{{ 'label.SUMT06.CompanyName' | translate }}</textbox>
                </div>
            </div>
          </form>
        </div>
    </app-card>
  </div>
</div>
<div class="row">
  <div class="col">
    <app-card header="{{ 'label.SUMT06.Department' | translate }}">
      <div class="card-content">
        <form [formGroup]="departmentDetailDataSource.form">
          <div *ngFor="let div of divisions | async">
            <mat-checkbox
              color="primary"
              [checked]="isChecked(div.departmentCode)"
              (change)="onDivisionToggle(div, $event.checked)">
              {{ div.departmentNameTha }}
            </mat-checkbox>
          </div>
        </form>
      </div>
    </app-card>
  </div>
</div>
