<h4>{{ 'label.SUMT02.ProgramName' | translate }}</h4>
<div class="row">
    <div class="col">
        <app-card>
            <div class="card-content">
                <div class="row">
                    <div class="col-6">
                        <app-search [value]="keyword" (search)="onSearch($event)"
                            placeholder="{{ 'label.SUMT02.SearchPlaceholder' | translate }}">
                        </app-search>
                    </div>
                    <div class="col-6 text-end">
                        <button class="btn btn-primary" (click)="add()"><i class="fas fa-plus-circle"></i>
                            {{ 'label.ALL.Add' | translate }}</button>
                    </div>
                </div>
                <br>
                <div class="row">
                    <div class="col">
                        <app-table server [dataSource]="data" [columns]="displayedColumns">
                            <ng-container matSort [matSortActive]="data.sortInfo.property"
                                [matSortDirection]="data.sortInfo.direction">
                                <ng-container matColumnDef="username">
                                    <th mat-header-cell *matHeaderCellDef mat-sort-header columnWidth="200px"
                                        class="text-center">{{ 'label.SUMT02.Username' | translate }}</th>
                                    <td mat-cell *matCellDef="let row" class="text-center">
                                        <a [routerLink]="['detail']" (click)="edit(row)">{{row.username}}</a>
                                    </td>
                                </ng-container>
                                <ng-container matColumnDef="firstName">
                                    <th mat-header-cell *matHeaderCellDef mat-sort-header columnWidth="250px"
                                        class="text-center">{{ 'label.SUMT02.FirstName' | translate }}</th>
                                    <td mat-cell *matCellDef="let row" class="text-left">{{row.firstName}}</td>
                                </ng-container>
                                <ng-container matColumnDef="lastName">
                                    <th mat-header-cell *matHeaderCellDef mat-sort-header columnWidth="250px"
                                        class="text-center">{{ 'label.SUMT02.LastName' | translate }}</th>
                                    <td mat-cell *matCellDef="let row" class="text-left">{{row.lastName}}</td>
                                </ng-container>
                                <ng-container matColumnDef="isActive">
                                    <th mat-header-cell *matHeaderCellDef mat-sort-header columnWidth="100px"
                                        class="text-center">{{ 'label.ALL.Active' | translate }}</th>
                                    <td mat-cell *matCellDef="let row" class="text-center"> <i *ngIf="row.isActive"
                                            class="fas fa-check text-success"></i></td>
                                </ng-container>
                                <ng-container matColumnDef="action">
                                    <th mat-header-cell *matHeaderCellDef columnWidth="80px" class="text-center">{{
                                        'label.ALL.Delete' | translate }}</th>
                                    <td mat-cell *matCellDef="let row" class="text-center">
                                        <button class="btn btn-outline-danger btn-sm" (click)="remove(row)"
                                            *ngIf="actions.delete == true">
                                            <i class="far fa-trash-alt"></i>
                                        </button>
                                    </td>
                                </ng-container>
                                <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                            </ng-container>
                        </app-table>
                    </div>
                </div>
            </div>
        </app-card>
    </div>
</div>
