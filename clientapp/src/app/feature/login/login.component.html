<div class="login-page">
  <div class="login-card">
    <div class="lang-selector">
      <span>ไทย</span>
      <i class="fas fa-chevron-down"></i>
    </div>

    <div class="login-header">
      <h1 class="logo-text">
        <span class="brand-puean">บ็อกซ์คอร์เนอร์</span>
        <span class="brand-ngoen">อาร์ต</span>
      </h1>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
      <div class="form-group mb-3">
        <label for="username">ชื่อผู้ใช้งาน หรือ อีเมล</label>
        <div class="input-outer-wrapper">
          <div class="icon-side">
            <i class="far fa-user-circle"></i>
          </div>
          <div class="input-side">
            <input type="text" id="username" formControlName="username" placeholder="username" class="form-control">
          </div>
        </div>
        <div *ngIf="submitted && f['username'].errors" class="error-msg">
          <span *ngIf="f['username'].errors['required']">กรุณากรอกชื่อผู้ใช้งาน หรือ อีเมล</span>
        </div>
      </div>

      <div class="form-group mb-1">
        <label for="password">รหัสผ่าน</label>
        <div class="input-outer-wrapper">
          <div class="icon-side">
            <i class="fas fa-key"></i>
          </div>
          <div class="input-side">
            <div class="input-with-eye">
              <input type="password" id="password" formControlName="password" placeholder="รหัสผ่าน"
                class="form-control">
              <span class="eye-icon"><i class="far fa-eye"></i></span>
            </div>
          </div>
        </div>
        <div *ngIf="submitted && f['password'].errors" class="error-msg">
          <span *ngIf="f['password'].errors['required']">กรุณากรอกรหัสผ่าน</span>
        </div>
        <div class="forgot-wrapper">
          <a routerLink="/forgot-password" class="forgot-link">ลืมรหัสผ่าน?</a>
        </div>
      </div>

      <button type="submit" [disabled]="loading" class="btn-login-refine">
        <span>เข้าสู่ระบบ</span>
        <i class="far fa-arrow-alt-circle-right" *ngIf="!loading"></i>
        <div *ngIf="loading" class="spinner-border spinner-border-sm ms-2"></div>
      </button>

      <div *ngIf="error" class="alert alert-danger mt-3 py-2 text-center">
        {{ error }}
      </div>
    </form>
  </div>
</div>
