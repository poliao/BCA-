<toolbar>
    <button class="btn btn-primary" (click)="save()">
        <i class="fas fa-cog fa-spin" [hidden]="!saving"></i>
        <i class="fas fa-save" [hidden]="saving"></i> {{ 'label.ALL.Save' | translate }}
    </button>
</toolbar>

<h4>{{ 'label.DBMT01.ProgramName' | translate }}</h4>
<div class="row">
    <div class="col">
        <app-card header="{{ 'label.DBMT01.ProgramDetail' | translate }}">
            <div class="card-content">
                <form [formGroup]="languageDataSource.form">
                    <div class="row g-3">
                        <div class="col-lg-4 col-md-6">
                            <textbox formControlName="languageCode">
                                {{ 'label.DBMT01.LanguageCode' | translate }}
                            </textbox>
                        </div>
                        <div class="col-lg-4 col-md-6">
                            <textbox formControlName="languageName">
                                {{ 'label.DBMT01.LanguageName' | translate }}
                            </textbox>
                        </div>
                        <div class="col-lg-4 col-md-6 d-flex align-items-center">
                            <checkbox formControlName="isActive">
                                {{ 'label.ALL.Active' | translate }}
                            </checkbox>
                        </div>
                    </div>
                </form>
            </div>
        </app-card>
    </div>
</div>
