<h4>{{ 'label.POMT01.ProgramName' | translate }}</h4>
<div class="row mt-3">
    <div class="col">
        <app-card>
            <div class="card-content">
                <div class="row mb-3">
                    <div class="col-6">
                        <h5>{{ 'label.POMT01.CategoryHierarchy' | translate }}</h5>
                    </div>
                    <div class="col-6 text-end">
                        <button *ngIf="actions.create" class="btn btn-primary" (click)="add()">
                            <i class="fas fa-plus-circle"></i> {{ 'label.ALL.AddRoot' | translate }}
                        </button>
                    </div>
                </div>

                <mat-tree [dataSource]="dataSource" [treeControl]="treeControl" class="category-tree">
                    <!-- Leaf node -->
                    <mat-tree-node *matTreeNodeDef="let node" matTreeNodeToggle>
                        <div class="tree-node">
                            <button mat-icon-button disabled></button>
                            <span class="node-content">
                                <strong>[{{node.categoryCode}}]</strong> {{node.categoryNameTh}}
                            </span>
                            <div class="node-actions ms-auto">
                                <button class="btn btn-link btn-sm text-primary"
                                    (click)="add(node.categoryCode)" title="Add Sub">
                                    <i class="fas fa-plus"></i>
                                </button>
                                <button class="btn btn-link btn-sm text-warning" (click)="edit(node)"
                                    title="Edit">
                                    <i class="fas fa-edit"></i>
                                </button>
                                <button class="btn btn-link btn-sm text-danger" (click)="remove(node)"
                                    title="Delete">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </div>
                        </div>
                    </mat-tree-node>

                    <!-- Expandable node -->
                    <mat-nested-tree-node *matTreeNodeDef="let node; when: hasChild">
                        <div class="mat-tree-node" matTreeNodeToggle>
                            <button mat-icon-button [attr.aria-label]="'Toggle ' + node.categoryNameTh">
                                <mat-icon class="mat-icon-rtl-mirror">
                                    {{treeControl.isExpanded(node) ? 'expand_more' : 'chevron_right'}}
                                </mat-icon>
                            </button>
                            <span class="node-content">
                                <strong>[{{node.categoryCode}}]</strong> {{node.categoryNameTh}}
                            </span>
                            <div class="node-actions ms-auto">
                                <button class="btn btn-link btn-sm text-primary"
                                    (click)="add(node.categoryCode)" title="Add Sub">
                                    <i class="fas fa-plus"></i>
                                </button>
                                <button class="btn btn-link btn-sm text-warning" (click)="edit(node)"
                                    title="Edit">
                                    <i class="fas fa-edit"></i>
                                </button>
                                <button class="btn btn-link btn-sm text-danger" (click)="remove(node)"
                                    title="Delete">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </div>
                        </div>
                        <div [class.category-tree-invisible]="!treeControl.isExpanded(node)" role="group">
                            <ng-container matTreeNodeOutlet></ng-container>
                        </div>
                    </mat-nested-tree-node>
                </mat-tree>
            </div>
        </app-card>
    </div>
</div>
