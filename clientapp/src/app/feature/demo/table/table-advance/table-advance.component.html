<div class="row">
    <div class="col">
        <app-card header="Advance table">
            <div class="card-content">
                <app-table [dataSource]="advanceDataSource" [pagination]="false" [columns]="displayedAdvanceColumns"
                    [containerHeight]="500" [multiTemplateDataRows]="false">
                    <ng-container matColumnDef="name" sticky>
                        <th mat-header-cell *matHeaderCellDef columnWidth="300px"> </th>
                        <td mat-cell *matCellDef="let row" class="text-end">
                            {{ row.name}}
                        </td>
                    </ng-container>
                    <ng-container matColumnDef="price" sticky>
                        <th mat-header-cell *matHeaderCellDef columnWidth="100px"> price </th>
                        <td mat-cell *matCellDef="let row">
                            {{ row.price}}
                        </td>
                    </ng-container>
                    <ng-container matColumnDef="sellingPrice" sticky>
                        <th mat-header-cell *matHeaderCellDef columnWidth="100px"> sellingprice </th>
                        <td mat-cell *matCellDef="let row">
                            {{ row.sellingPrice}}
                        </td>
                    </ng-container>
                    <ng-container matColumnDef="barRate" sticky>
                        <th mat-header-cell *matHeaderCellDef columnWidth="100px"> barrate </th>
                        <td mat-cell *matCellDef="let row">
                            {{ row.barRate}}
                        </td>
                    </ng-container>
                    <ng-container *ngFor="let column of adjust">
                        <ng-container [matColumnDef]="getName(column,'single')">
                            <th mat-header-cell *matHeaderCellDef columnWidth="60px">
                                single
                            </th>
                            <td mat-cell *matCellDef="let row">
                                <textbox [value]="" [small]="true" [hasLabel]="false"></textbox>
                            </td>
                        </ng-container>
                        <ng-container [matColumnDef]="getName(column,'double')">
                            <th mat-header-cell *matHeaderCellDef columnWidth="60px">
                                double
                            </th>
                            <td mat-cell *matCellDef="let row">
                                <textbox [value]="" [small]="true" [hasLabel]="false"></textbox>
                            </td>
                        </ng-container>
                    </ng-container>
                    <ng-container matColumnDef="percentDummy" sticky>
                        <th mat-header-cell *matHeaderCellDef [attr.colspan]="displayedAdvanceColumns.length"></th>
                    </ng-container>
                    <ng-container *ngFor="let column of adjust">
                        <ng-container [matColumnDef]="column.percent">
                            <th mat-header-cell *matHeaderCellDef colspan="2" class="text-center">
                                {{ column.percent }}
                            </th>
                        </ng-container>
                    </ng-container>

                    <ng-container matColumnDef="parentDummy" sticky>
                        <th mat-header-cell *matHeaderCellDef [attr.colspan]="3" class="border-bottom-0"></th>
                    </ng-container>

                    <ng-container matColumnDef="parent">
                        <th mat-header-cell *matHeaderCellDef [attr.colspan]="displayedMatrix.length+1"
                            class="text-center">
                            Adjust Selling Price
                        </th>
                    </ng-container>

                    <tr mat-header-row *matHeaderRowDef="['parentDummy','parent'];sticky:true"></tr>
                    <tr mat-header-row *matHeaderRowDef="adjustHeader;sticky:true"></tr>
                    <tr mat-header-row *matHeaderRowDef="allColumns;sticky: true"></tr>
                    <tr mat-row *matRowDef="let row; columns: allColumns"></tr>

                    <ng-container matColumnDef="groupHeader" sticky>
                        <td mat-cell [attr.colspan]="allColumns.length - 1" *matCellDef="let groupBy"><strong>
                                Start Date {{groupBy.startDate}}, Room Type {{ groupBy.roomType }}, dayOfWeek {{
                                groupBy.dayOfWeek}}</strong></td>
                    </ng-container>


                    <tr mat-row *matRowDef="let row; columns: ['groupHeader']; when: isGroup"> </tr>

                    <ng-container matColumnDef="total" sticky>
                        <td [attr.colspan]="allColumns.length" mat-cell *matCellDef="let row"><strong>
                                {{row.total}}</strong></td>
                    </ng-container>

                    <tr mat-row *matRowDef="let row; columns: ['total']; when: isTotal"> </tr>
                </app-table>
            </div>
        </app-card>
    </div>
</div>
