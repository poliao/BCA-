<h4>Table multiple select</h4>
<div class="row">
    <div class="col">
        <app-card header="table">
            <div class="card-menu">
                <button class="btn btn-primary" (click)="add()"><i class="fas fa-plus-circle"></i>
                    {{ 'label.ALL.Add' | translate }}</button>
            </div>
            <div class="card-content">
                <app-table [dataSource]="dataSource" [columns]="displayedColumns">
                    <ng-container matSort>
                        <ng-container matColumnDef="value">
                            <th mat-header-cell *matHeaderCellDef mat-sort-header columnWidth="200px"> Program Code
                            </th>
                            <td mat-cell *matCellDef="let element"> {{element.value}} </td>
                        </ng-container>
                        <!-- Custom column definition to be provided to the wrapper table. -->
                        <ng-container matColumnDef="text">
                            <th mat-header-cell *matHeaderCellDef mat-sort-header columnWidth="300px"> Program Name
                            </th>
                            <td mat-cell *matCellDef="let element"> {{element.text}} </td>
                        </ng-container>
                        <ng-container matColumnDef="action">
                            <th mat-header-cell *matHeaderCellDef>Delete</th>
                            <td mat-cell *matCellDef="let element">
                                <button class="btn btn-outline-danger btn-sm" (click)="remove(element)">
                                    <i class="far fa-trash-alt"></i>
                                </button>
                            </td>
                        </ng-container>
                        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                    </ng-container>
                </app-table>
            </div>
        </app-card>
    </div>
</div>
