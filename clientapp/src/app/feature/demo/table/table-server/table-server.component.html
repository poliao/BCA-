<h4>Table</h4>
<div class="row">
    <div class="col">
        <app-card header="table">
            <div class="card-content">
                <app-table server [dataSource]="data" [columns]="displayedColumns">
                    <ng-container matSort>
                        <ng-container matColumnDef="number">
                            <th mat-header-cell *matHeaderCellDef columnWidth="300px">#</th>
                            <td mat-cell *matCellDef="let row">{{row.number}}</td>
                        </ng-container>
                        <ng-container matColumnDef="title">
                            <th mat-header-cell *matHeaderCellDef columnWidth="300px">Title</th>
                            <td mat-cell *matCellDef="let row">{{row.title}}</td>
                        </ng-container>


                        <ng-container matColumnDef="state">
                            <th mat-header-cell *matHeaderCellDef columnWidth="300px">State</th>
                            <td mat-cell *matCellDef="let row">{{row.state}}</td>
                        </ng-container>


                        <ng-container matColumnDef="created">
                            <th mat-header-cell *matHeaderCellDef mat-sort-header disableClear columnWidth="300px">
                                Created
                            </th>
                            <td mat-cell *matCellDef="let row">{{row.created_at | date}}</td>
                        </ng-container>

                        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                    </ng-container>
                </app-table>
            </div>
        </app-card>
    </div>
</div>
