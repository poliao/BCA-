<label class="form-label" *ngIf="hasLabel" for="typeaheadSelect">
  <ng-content></ng-content><span *ngIf="required" class="text-danger"> *</span><span *ngIf="control.hasError('minSearchTerm')" class="text-danger">{{ 'message.STD00010' | translate:{ '0' : minSearchTerm } }}</span>
</label>
<label #viewField class="field-hidden" for="typeaheadSelect">{{ selectedText }}</label>
<div #editField>
  <ng-select id="typeaheadSelect" class="custom" [class.is-invalid]="hasErrors" [items]="items | async" [bindLabel]="bindLabel"
    [bindValue]="bindValue" [disabled]="disabled" [appendTo]="appendTo" dropdownPosition="bottom" [class.sm]="small"
    [ngModel]="value" (ngModelChange)="onSelected($event)" [loading]="loading" [trackByFn]="trackByFn" (open)="onOpen()"
    [typeahead]="typeAhead" notFoundText="{{ 'label.ALL.NotFound' | translate }}"
    typeToSearchText="{{ 'label.ALL.TypeToSearch' | translate }}" placeholder="{{ placeholder | translate }}"
    [ngModelOptions]="{ standalone: true }" matTooltip="{{ selectedText }}">
    <ng-template *ngIf="labelTemp" ng-label-tmp let-item="item">
      <ng-template *ngTemplateOutlet="labelTemp; context: { item: item }"></ng-template>
    </ng-template>
    <ng-template *ngIf="showDescription" ng-option-tmp let-item="item" let-index="index" let-search="searchTerm">
      <div [ngOptionHighlight]="search" class="ng-option-label" matTooltip="{{ item[bindLabel] }}">
        {{ item[bindLabel] }}
      </div>
      <small class="text-muted" [ngOptionHighlight]="search" matTooltip="{{ item[bindDesc] }}">
        {{ item[bindDesc] }}
      </small>
    </ng-template>
    <ng-template *ngIf="!optionTemp && !showDescription" ng-option-tmp let-item="item" let-search="searchTerm">
      <span class="ng-option-label" [ngOptionHighlight]="search" matTooltip="{{ item[bindLabel] }}">
        {{ item[bindLabel] }}
      </span>
    </ng-template>
    <ng-template *ngIf="optionTemp && !showDescription" ng-option-tmp let-item="item" let-search="searchTerm">
      <ng-container *ngTemplateOutlet="optionTemp; context: { item: item, search:search }"></ng-container>
    </ng-template>
  </ng-select>
  <div class="invalid" *ngIf="hasErrors">
    <div *ngIf="control.hasError('required')">
      {{ 'message.STD00001' | translate }}
    </div>
  </div>
</div>
